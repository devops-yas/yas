# 1. Ép Hibernate sử dụng đúng Dialect của PostgreSQL (FIX LỖI CHÍNH)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 2. Cung cấp cấu hình Datasource mồi (Dummy config)
# Khi chạy test, Testcontainers (@ServiceConnection) sẽ ghi đè các giá trị này, 
# nhưng chúng phải tồn tại để Spring không bỏ qua việc khởi tạo JPA.
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

# Setting Spring context path & port
server.servlet.context-path=/v1
server.port=8084
spring.jpa.hibernate.ddl-auto=update
spring.liquibase.enabled=false
# Setting Spring profile
spring.profiles.active=test
spring.security.oauth2.resourceserver.jwt.issuer-uri=test
springdoc.oauthflow.authorization-url=test
springdoc.oauthflow.token-url=test

cors.allowed-origins=*